<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — One Website, Every Business</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--brand:#2f9edb;--bg:#0d1220;--card:#161e33;--line:#263351;--text:#f2f5fb;--muted:#8b96ab}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .top{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
  .demo-tag{font-size:.7rem;color:var(--muted);border:1px solid var(--line);padding:5px 12px;border-radius:99px;letter-spacing:1px}
  .lang{display:flex;gap:4px}
  .lang button{background:transparent;border:1px solid var(--line);color:var(--muted);padding:5px 11px;
    border-radius:8px;font-size:.74rem;font-weight:700;cursor:pointer}
  .lang button.active{background:var(--brand);border-color:var(--brand);color:#fff}

  .picker{max-width:900px;margin:6px auto 26px;padding:0 16px;text-align:center}
  .picker .hint{font-size:1.05rem;font-weight:800;margin-bottom:14px}
  .picker .hint span{color:var(--brand)}
  .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .bbtn{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:12px 18px;
    color:var(--text);cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:700;
    display:flex;align-items:center;gap:8px;transition:all .2s}
  .bbtn .em{font-size:1.25rem}
  .bbtn:hover{transform:translateY(-2px)}
  .bbtn.active{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 18%,var(--card))}

  .site{max-width:900px;margin:0 auto;padding:0 16px 60px;animation:fade .45s ease}
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .hero{background:linear-gradient(135deg,color-mix(in srgb,var(--brand) 30%,#10182c),#131b30);
    border:1px solid color-mix(in srgb,var(--brand) 45%,var(--line));border-radius:26px;
    padding:54px 30px;text-align:center;margin-bottom:16px}
  .hero .em{font-size:4rem;display:block;margin-bottom:14px}
  .hero h1{font-size:clamp(1.8rem,5.5vw,2.8rem);font-weight:900;margin-bottom:10px}
  .hero p{color:var(--muted);font-size:1.05rem;max-width:480px;margin:0 auto 28px}
  .cta{display:inline-block;background:var(--brand);color:#fff;padding:15px 38px;border-radius:99px;
    text-decoration:none;font-weight:800;font-size:.95rem;transition:transform .15s}
  .cta:hover{transform:scale(1.05)}

  .svc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
  .svc{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;display:flex;
    justify-content:space-between;align-items:center;gap:12px}
  .svc b{font-size:.95rem;display:block;margin-bottom:4px}
  .svc p{font-size:.78rem;color:var(--muted)}
  .svc .pr{color:var(--brand);font-weight:900;font-size:1.05rem;white-space:nowrap}

  .perks{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .perk{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
  .perk .em{font-size:1.4rem;display:block;margin-bottom:6px}
  .perk span{font-size:.72rem;color:var(--muted);font-weight:600}

  .bookbox{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:28px 22px}
  .bookbox h2{font-size:1.25rem;font-weight:900;text-align:center;margin-bottom:4px}
  .bookbox .bsub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:18px}
  form{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:560px;margin:0 auto}
  input,select{padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;background:#0f1524;
    color:var(--text);font-family:inherit;font-size:.88rem}
  input:focus,select:focus{outline:none;border-color:var(--brand)}
  form button{grid-column:1/-1;background:var(--brand);color:#fff;border:none;padding:15px;border-radius:12px;
    font-weight:800;font-size:.98rem;cursor:pointer;font-family:inherit}

  .foot{text-align:center;color:var(--muted);font-size:.7rem;padding:24px}
  @media(max-width:640px){.svc-grid,form{grid-template-columns:1fr}.perks{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

let LANG='en', BR='dental';

function renderTabs(){
  const t=T[LANG], w=document.getElementById('btns'); w.innerHTML='';
  ORDER.forEach(k=>{
    const b=document.createElement('button');
    b.className='bbtn'+(k===BR?' active':'');
    b.innerHTML=`<span class="em">${ICONS[k]}</span>${t.tabs[k]}`;
    b.onclick=()=>{BR=k;renderAll();};
    w.appendChild(b);
  });
}
function renderSite(){
  const t=T[LANG], d=t.br[BR];
  document.documentElement.style.setProperty('--brand',BRANDS[BR]);
  const svc=d.svc.map(s=>`<div class="svc"><div><b>${s[0]}</b><p>${s[1]}</p></div><span class="pr">${s[2]}</span></div>`).join('');
  const perks=t.perks.map(p=>`<div class="perk"><span class="em">${p[0]}</span><span>${p[1]}</span></div>`).join('');
  const opts=d.svc.map(s=>`<option>${s[0]}</option>`).join('');
  document.getElementById('site').innerHTML=`
    <div class="hero">
      <span class="em">${ICONS[BR]}</span>
      <h1>${d.nm}</h1>
      <p>${d.sub}</p>
      <a class="cta" href="#bform" onclick="document.getElementById('bform').scrollIntoView({behavior:'smooth'});return false;">${d.cta}</a>
    </div>
    <div class="svc-grid">${svc}</div>
    <div class="perks">${perks}</div>
    <div class="bookbox" id="bform">
      <h2>${d.bh}</h2>
      <div class="bsub">${d.bs}</div>
      <form onsubmit="event.preventDefault();alert(T[LANG].alert);">
        <input type="text" placeholder="${t.form.name}" required>
        <input type="tel" placeholder="${t.form.phone}" required>
        <select>${opts}</select>
        <input type="date" required>
        <button type="submit">${t.form.btn}</button>
      </form>
      <div class="bsub" style="margin-top:12px">${t.form.sub}</div>
    </div>`;
}
function renderAll(){
  renderTabs(); renderSite();
  document.getElementById('hint').innerHTML=T[LANG].hint;
  document.getElementById('foot').textContent=T[LANG].foot;
}
function setLang(l){
  LANG=l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+l).classList.add('active');
  document.documentElement.lang=l;
  renderAll();
}
renderAll();
</script>
