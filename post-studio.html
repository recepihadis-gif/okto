<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKTO — Post Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e18;--card:#121a2c;--line:#22304d;--text:#eef2fb;--mut:#8b95ab;
    --vio:#7c6cff;--cyan:#38d4c3;--gold:#f5b942;--green:#31c979;--red:#ff6b6b;--rose:#e1508d}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:18px}
  .disp{font-family:'Space Grotesk',sans-serif}

  .top{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:560px;margin-bottom:10px}
  .top b{font-family:'Space Grotesk',sans-serif;font-size:1rem}
  .top b span{color:var(--cyan)}
  .lang{display:flex;gap:4px}
  .lang button{background:transparent;border:1px solid var(--line);color:var(--mut);padding:5px 11px;
    border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit}
  .lang button.active{background:var(--vio);border-color:var(--vio);color:#fff}

  .hint{font-size:.78rem;color:var(--mut);text-align:center;max-width:520px;margin-bottom:16px;line-height:1.5}
  .hint b{color:var(--gold)}

  /* THE POST CARD — square 1:1 */
  .stage{width:100%;max-width:540px}
  .post{aspect-ratio:1/1;border-radius:6px;position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:center;padding:8%;
    background:radial-gradient(120% 90% at 85% -10%,rgba(124,108,255,.35),transparent 55%),
      radial-gradient(100% 80% at -10% 110%,rgba(56,212,195,.22),transparent 55%),#0b1020}
  .post .brand{position:absolute;top:5.5%;left:8%;display:flex;align-items:center;gap:8px;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(.8rem,3vw,1.05rem);letter-spacing:.04em}
  .post .brand .oct{font-size:1.2em}
  .post .handle{position:absolute;bottom:5.5%;left:8%;font-size:clamp(.6rem,2.2vw,.78rem);color:var(--mut);font-weight:600}
  .post .num{position:absolute;top:5.5%;right:8%;font-family:'Space Grotesk',sans-serif;color:var(--mut);
    font-size:clamp(.6rem,2.2vw,.78rem);letter-spacing:.2em}
  .post .kick{font-size:clamp(.62rem,2.4vw,.82rem);letter-spacing:.3em;text-transform:uppercase;
    font-weight:700;margin-bottom:4%}
  .post h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.5rem,6.6vw,2.5rem);
    line-height:1.12;letter-spacing:-.01em;margin-bottom:4%}
  .post .sub{color:#b9c2d8;font-size:clamp(.78rem,3vw,1.02rem);line-height:1.55;max-width:92%}
  .post .cta{margin-top:6%;display:inline-flex;align-self:flex-start;background:#fff;color:#0b1020;
    font-weight:800;font-size:clamp(.7rem,2.6vw,.9rem);padding:.9em 1.8em;border-radius:99px}
  .post .rows{margin-top:4%;display:flex;flex-direction:column;gap:2.5%}
  .post .row{display:flex;gap:10px;align-items:flex-start;font-size:clamp(.74rem,2.8vw,.95rem);color:#cdd5e8;line-height:1.45}
  .post .row b{color:#fff}
  .post .row .x{font-weight:900}

  .vs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5%}
  .vsbox{border-radius:14px;padding:6% 5%;border:2px solid}
  .vsbox.bad{border-color:rgba(255,107,107,.55);background:rgba(255,107,107,.08)}
  .vsbox.good{border-color:rgba(49,201,121,.55);background:rgba(49,201,121,.08)}
  .vsbox .em{font-size:clamp(1.1rem,4vw,1.5rem)}
  .vsbox .money{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.3rem,5.6vw,2.1rem);margin:2% 0}
  .vsbox.bad .money{color:var(--red)} .vsbox.good .money{color:var(--green)}
  .vsbox p{font-size:clamp(.62rem,2.3vw,.8rem);color:#cdd5e8;line-height:1.4}

  .bigmoney{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(2.4rem,11vw,4.2rem);
    line-height:1;margin:3% 0}

  /* controls + caption */
  .nav{display:flex;gap:10px;align-items:center;justify-content:center;margin:16px 0 10px}
  .nav button{background:var(--card);border:1px solid var(--line);color:var(--text);width:44px;height:44px;
    border-radius:50%;font-size:1.1rem;cursor:pointer}
  .nav .cnt{font-size:.8rem;color:var(--mut);min-width:64px;text-align:center;font-weight:700}
  .cap{width:100%;max-width:540px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .cap .cl{font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between}
  .cap p{font-size:.82rem;color:#c6cee2;line-height:1.6;white-space:pre-line}
  .copybtn{background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:3px 10px;
    font-size:.64rem;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="top">
  <b>🐙 OKTO <span>Post Studio</span></b>
  <div class="lang">
    <button id="btn-en" class="active" onclick="setLang('en')">EN</button>

</div>

<div class="stage"><div class="post" id="post"></div></div>

<div class="nav">
  <button onclick="go(-1)">←</button>
  <span class="cnt" id="cnt">1 / 9</span>

</div>

<div class="cap">
  <div class="cl"><span id="cl">CAPTION — copy this</span><button class="copybtn" onclick="copyCap()" id="cpb">COPY</button></div>
  <p id="cap"></p>
</div>

  cap:'Како паметните бизниси собираат стотици Google рецензии? Не со молење.\n\nПо секоја посета, системот учтиво бара — автоматски. Повеќе рецензии = повисоко на Google Maps = повеќе клиенти.\n\nГледајте како работи → bio 🐙'},
 {kick:'ОВОЈ МЕСЕЦ',kc:'var(--cyan)',h:'Првите 3 бизниси<br>добиваат специјална понуда.',
  sub:'Бесплатен преглед на ВАШИОТ бизнис пред да платите било што. Ако не ви се допаѓа, не должите ништо.',
  cta:'DM "ПРИМЕР" сега',
  cap:'Спремни да не губите повеќе клиенти? 🐙\n\nПрвите 3 бизниси овој месец добиваат специјална цена + БЕСПЛАТЕН преглед на нивната страница или систем пред да одлучат.\n\nПишете ни DM "ПРИМЕР" со името на бизнисот — ви покажуваме како може да изгледате.'}]}
};

let LANG='en', IDX=0;

function render(){
  const t=T[LANG], c=t.cards[IDX], p=document.getElementById('post');
  let inner=`<div class="brand"><span class="oct">🐙</span>OKTO</div>
    <span class="num">${String(IDX+1).padStart(2,'0')} / 09</span>
    <div class="kick" style="color:${c.kc}">${c.kick}</div>
    <h1>${c.h}</h1>`;
  if(c.sub) inner+=`<p class="sub">${c.sub}</p>`;
  if(c.rows) inner+=`<div class="rows">${c.rows.map(r=>`<div class="row"><span class="x" style="color:${r[0]==='✓'?'var(--green)':'var(--red)'}">${r[0]}</span><span>${r[1]}</span></div>`).join('')}</div>`;
  if(c.vs) inner+=`<div class="vs">
      <div class="vsbox bad"><span class="em">${c.bad[0]}</span><div class="money">${c.bad[1]}</div><p>${c.bad[2]}</p></div>
      <div class="vsbox good"><span class="em">${c.good[0]}</span><div class="money">${c.good[1]}</div><p>${c.good[2]}</p></div>
    </div>`;
  if(c.cta) inner+=`<span class="cta">${c.cta}</span>`;
  inner+=`<div class="handle">@okto · demos: link in bio</div>`;
  p.innerHTML=inner;
  document.getElementById('cnt').textContent=`${IDX+1} / 9`;
  document.getElementById('cap').textContent=c.cap;
  document.getElementById('hint').innerHTML=t.hint;
  document.getElementById('cl').textContent=t.cl;
  document.getElementById('cpb').textContent=t.copy;
}
function go(d){IDX=(IDX+9+d)%9;render();}
function copyCap(){
  navigator.clipboard.writeText(T[LANG].cards[IDX].cap).then(()=>{
    document.getElementById('cpb').textContent=T[LANG].copied;
    setTimeout(()=>document.getElementById('cpb').textContent=T[LANG].copy,1500);
  });
}
function setLang(l){
  LANG=l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+l).classList.add('active');
  render();
}
render();
</script>
