<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKTO — Showcase Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e18;--card:#121a2c;--line:#22304d;--text:#eef2fb;--mut:#8b95ab;
    --vio:#7c6cff;--cyan:#38d4c3;--gold:#f5b942;--green:#31c979}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:18px}

  .top{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:560px;margin-bottom:10px}
  .top b{font-family:'Space Grotesk',sans-serif;font-size:1rem}
  .top b span{color:var(--cyan)}
  .lang{display:flex;gap:4px}
  .lang button{background:transparent;border:1px solid var(--line);color:var(--mut);padding:5px 11px;
    border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit}
  .lang button.active{background:var(--vio);border-color:var(--vio);color:#fff}
  .hint{font-size:.78rem;color:var(--mut);text-align:center;max-width:520px;margin-bottom:16px;line-height:1.5}
  .hint b{color:var(--gold)}

  /* POST CARD 1:1 */
  .stage{width:100%;max-width:540px}
  .post{aspect-ratio:1/1;border-radius:6px;position:relative;overflow:hidden;
    background:radial-gradient(120% 90% at 85% -10%,rgba(124,108,255,.32),transparent 55%),
      radial-gradient(100% 80% at -10% 110%,rgba(56,212,195,.2),transparent 55%),#0b1020;
    display:flex;align-items:center}
  .post .brand{position:absolute;top:5%;left:7%;display:flex;align-items:center;gap:8px;z-index:5;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(.8rem,3vw,1rem)}
  .post .live{position:absolute;top:5%;right:7%;z-index:5;display:flex;align-items:center;gap:6px;
    font-size:clamp(.55rem,2vw,.68rem);font-weight:800;color:var(--green);letter-spacing:.15em;
    border:1px solid rgba(49,201,121,.4);border-radius:99px;padding:.5em 1em;background:rgba(49,201,121,.08)}
  .post .live i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .post .txt{width:47%;padding:0 0 0 7%;z-index:4}
  .post .k{font-size:clamp(.56rem,2.1vw,.72rem);letter-spacing:.26em;text-transform:uppercase;
    font-weight:800;color:var(--cyan);margin-bottom:5%}
  .post h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(1.15rem,4.6vw,1.75rem);
    line-height:1.14;margin-bottom:5%}
  .post .feat{display:flex;flex-direction:column;gap:2.5%}
  .post .f{display:flex;gap:8px;font-size:clamp(.62rem,2.4vw,.8rem);color:#c3cbdf;line-height:1.4;align-items:flex-start}
  .post .f b{color:var(--green);font-weight:900}
  .post .cta{margin-top:7%;display:inline-block;background:#fff;color:#0b1020;font-weight:800;
    font-size:clamp(.6rem,2.3vw,.78rem);padding:.85em 1.6em;border-radius:99px}
  .post .handle{position:absolute;bottom:4.5%;left:7%;font-size:clamp(.55rem,2vw,.7rem);color:var(--mut);font-weight:600;z-index:5}

  /* PHONE mockup with LIVE iframe */
  .phone-wrap{position:absolute;right:6%;top:14%;width:42%;z-index:3}
  .phone{width:100%;aspect-ratio:390/780;border-radius:12% / 6%;background:#05070d;
    border:3px solid #2a3350;box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 0 1px #0e1424;
    overflow:hidden;position:relative}
  .phone .notch{position:absolute;top:2.2%;left:50%;transform:translateX(-50%);width:34%;height:2.6%;
    background:#05070d;border-radius:99px;z-index:4;border:1px solid #1a2135}
  .phone .scr{position:absolute;inset:1.8% 2.4%;border-radius:9% / 4.5%;overflow:hidden;background:#fff}
  .phone iframe{width:390px;height:780px;border:0;transform-origin:0 0;pointer-events:none}

  /* DESKTOP browser mockup */
  .desk-wrap{position:absolute;right:4%;top:22%;width:58%;z-index:3}
  .desk{width:100%;border-radius:10px;overflow:hidden;background:#05070d;border:2px solid #2a3350;
    box-shadow:0 30px 70px rgba(0,0,0,.6)}
  .desk .bar{background:#161d30;padding:2.4% 3%;display:flex;align-items:center;gap:6px}
  .desk .bar i{width:8px;height:8px;border-radius:50%}
  .desk .bar i:nth-child(1){background:#ff5f57}.desk .bar i:nth-child(2){background:#febc2e}.desk .bar i:nth-child(3){background:#28c840}
  .desk .url{flex:1;background:#0b1020;border-radius:6px;font-size:clamp(.45rem,1.6vw,.6rem);
    color:var(--mut);padding:.4em .9em;margin-left:6px;white-space:nowrap;overflow:hidden}
  .desk .scr{aspect-ratio:1280/760;overflow:hidden;background:#fff;position:relative}
  .desk iframe{width:1280px;height:760px;border:0;transform-origin:0 0;pointer-events:none}

  .nav{display:flex;gap:10px;align-items:center;justify-content:center;margin:16px 0 10px}
  .nav button{background:var(--card);border:1px solid var(--line);color:var(--text);width:44px;height:44px;
    border-radius:50%;font-size:1.1rem;cursor:pointer}
  .nav .cnt{font-size:.8rem;color:var(--mut);min-width:64px;text-align:center;font-weight:700}
  .cap{width:100%;max-width:540px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .cap .cl{font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700;
    margin-bottom:8px;display:flex;justify-content:space-between}
  .cap p{font-size:.82rem;color:#c6cee2;line-height:1.6;white-space:pre-line}
  .copybtn{background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:3px 10px;
    font-size:.64rem;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="top">
  <b>🐙 OKTO <span>Showcase Studio</span></b>
  <div class="lang">

    <button id="btn-mk" onclick="setLang('mk')">MK</button>

<p class="hint" id="hint"><b>These cards show your REAL demos, live, inside the frame.</b> Wait 2-3 sec for each site to load → screenshot → post with the caption below.</p>

<div class="nav">

</div>

<div class="cap">

</div>

];

let LANG='en', IDX=0;

function render(){
  const c=CARDS[IDX], t=c[LANG];
  const url=BASE+c.file;
  let mock='';
  if(c.mode==='phone'){
    mock=`<div class="phone-wrap"><div class="phone"><span class="notch"></span>
      <div class="scr"><iframe src="${url}" id="ifr" scrolling="no"></iframe></div></div></div>`;
  }else{
    mock=`<div class="desk-wrap"><div class="desk">
      <div class="bar"><i></i><i></i><i></i><span class="url">okto · ${c.file.replace('demo-','').replace('.html','')} · live</span></div>
      <div class="scr"><iframe src="${url}" id="ifr" scrolling="no"></iframe></div></div></div>`;
  }
  document.getElementById('post').innerHTML=`
    <div class="brand">🐙 OKTO</div>
    <div class="live"><i></i>LIVE DEMO</div>
    <div class="txt">
      <div class="k">${t.k}</div>
      <h1>${t.h}</h1>
      <div class="feat">${t.f.map(x=>`<div class="f"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('')}</div>
      <span class="cta">${t.cta}</span>
    </div>
    ${mock}
    <div class="handle">@okto · ${String(IDX+1).padStart(2,'0')}/09</div>`;
  // scale iframe to its container
  requestAnimationFrame(()=>{
    const ifr=document.getElementById('ifr');
    if(!ifr)return;
    const holder=ifr.parentElement;
    const scale=holder.clientWidth/(c.mode==='phone'?390:1280);
    ifr.style.transform=`scale(${scale})`;
  });
  document.getElementById('cnt').textContent=`${IDX+1} / 9`;
  document.getElementById('cap').textContent=t.cap;
}
function go(d){IDX=(IDX+9+d)%9;render();}
function copyCap(){
  navigator.clipboard.writeText(CARDS[IDX][LANG].cap).then(()=>{
    const b=document.getElementById('cpb');
    b.textContent='COPIED ✓'; setTimeout(()=>b.textContent='COPY',1500);
  });
}
function setLang(l){
  LANG=l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+l).classList.add('active');
  render();
}
addEventListener('resize',render);
render();
</script>
